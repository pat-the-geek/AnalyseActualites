# NOTE : Seul le service "analyse-actualites" doit être utilisé pour ce projet.

services:
  analyse-actualites:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyse-actualites
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./rapports:/app/rapports
      - ./samples:/app/samples
      - ./archives:/app/archives
      - ./config:/app/config
    ports:
      - "5050:5050"   # Viewer WUDD.ai → http://localhost:5050
    restart: unless-stopped
    tty: true
    # command: supprimé — entrypoint.sh appelle déjà exec cron -f
