# NOTE : Seul le service "analyse-actualites" doit être utilisé pour ce projet.

services:
  analyse-actualites:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyse-actualites
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./rapports:/app/rapports
      - ./samples:/app/samples
      - ./archives:/app/archives
      - ./config:/app/config
      # Backup — décommentez et adaptez les chemins si BACKUP_L1/BACKUP_L2 sont définis dans .env
      # - /votre/chemin/backup-L1:/backup-L1
      # - /votre/chemin/backup-L2:/backup-L2
      - /Volumes/USB1/WUDD-Backup:/backup
    ports:
      - "5050:5050"   # Viewer WUDD.ai → http://localhost:5050
    restart: unless-stopped
    tty: true
    # command: supprimé — entrypoint.sh appelle déjà exec cron -f
